{% extends "navbar.html" %}
{% block content %}

<style>
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#0b0f2a,#1a1f4d);
    color:white;
}

/* CONTAINER */
.container{
    max-width:500px;
    width:90%;
    margin:50px auto;
    padding:30px;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* TITLE */
h2{
    text-align:center;
    background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* IMAGE */
.profile-img{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

.profile-img img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid transparent;
    background: linear-gradient(45deg,#feda75,#d62976,#4f5bd5) border-box;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background: rgba(255,255,255,0.1);
    color:white;
    font-size:14px;
}

/* BUTTON */
button{
    width:100%;
    margin-top:15px;
    padding:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
    color:white;
    font-size:14px;
}

/* BACK */
.back{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#ccc;
    text-decoration:none;
}

/* ================= RESPONSIVE ================= */

/* TABLET */
@media (max-width: 768px){
    .container{
        margin:30px auto;
        padding:25px;
    }
}

/* MOBILE */
@media (max-width: 480px){
    .container{
        width:95%;
        padding:20px;
        border-radius:15px;
    }

    h2{
        font-size:20px;
    }

    .profile-img img{
        width:90px;
        height:90px;
    }

    input, button{
        font-size:13px;
        padding:9px;
    }
}

/* EXTRA SMALL */
@media (max-width: 350px){
    .container{
        padding:15px;
    }

    h2{
        font-size:18px;
    }

    .profile-img img{
        width:80px;
        height:80px;
    }
}
</style>

<div class="container">

<h2>👤 Update Profile</h2>

<div class="profile-img">
    {% if profile.profile_pic %}
        <img id="preview" src="{{ profile.profile_pic.url }}">
    {% else %}
        <img id="preview" src="https://via.placeholder.com/110">
    {% endif %}
</div>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="text" name="username" value="{{ user.username }}" placeholder="Username">
    <input type="email" name="email" value="{{ user.email }}" placeholder="Email">
    <input type="text" name="phone" value="{{ profile.phone }}" placeholder="Phone">

    <input type="file" name="profile_pic" onchange="previewImage(event)">

    <button type="submit">💾 Update Profile</button>
</form>

<a href="{% url 'userDashboard' %}" class="back">⬅ Back to Dashboard</a>

</div>

<script>
function previewImage(event){
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById('preview').src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
}
</script>

{% endblock %}
