{% extends "navbar.html" %}
{% block content %}

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

/* PAGE BACKGROUND */
body{
  background:#0b0f2a;
  color:white;
  overflow-x:hidden;
}

/* PAGE TITLE */
.page-title{
  font-size:48px;
  text-align:center;
  color:#7df9ff;
  margin:90px 0 10px;
}

.page-subtitle{
  text-align:center;
  color:#aaa;
  font-size:18px;
  margin-bottom:40px;
}

/* GALLERY GRID */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:0 5%;
  margin-bottom:50px;
}

/* GLASS CARD */
.gallery-card{
  position:relative;
  border-radius:15px;
  overflow:hidden;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  cursor:pointer;
  transition:transform .4s ease, box-shadow .4s ease;
}

/* 3D hover effect */
.gallery-card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

.gallery-card img{
  width:100%;
  height:200px;
  object-fit:cover;
  display:block;
}

/* Overlay text */
.gallery-card .overlay{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.45);
  color:white;
  padding:10px 15px;
  font-size:14px;
  text-align:left;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin:0 auto 50px;
  padding:12px 28px;
  border-radius:25px;
  background:#7df9ff;
  color:black;
  font-weight:bold;
  text-decoration:none;
  transition:transform .3s ease, box-shadow .3s ease;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 8px 20px #7df9ff;
}

/* RESPONSIVE */
@media(max-width:1024px){
  .page-title{font-size:42px;}
  .page-subtitle{font-size:17px;}
}

@media(max-width:768px){
  .page-title{font-size:36px;}
  .page-subtitle{font-size:16px;}
  .gallery-card img{height:180px;}
  .gallery-card .overlay{font-size:13px;}
  .btn{padding:10px 22px;}
}

@media(max-width:480px){
  .page-title{font-size:28px; margin-top:60px;}
  .page-subtitle{font-size:14px; margin-bottom:30px;}
  .gallery-card img{height:150px;}
  .gallery-card .overlay{font-size:12px; padding:8px 10px;}
  .btn{width:90%; padding:10px; font-size:14px;}
  .gallery-grid{padding:0 3%;}
}

@media(max-width:350px){
  .page-title{font-size:24px;}
  .gallery-card img{height:130px;}
  .gallery-card .overlay{font-size:11px; padding:6px 8px;}
}
</style>

<h1 class="page-title">Gallery</h1>
<p class="page-subtitle">Moments from our school activities and learning environment</p>

<div class="gallery-grid">
  {% for photo in for_gallery %}
    <div class="gallery-card">
      <img src="{{ photo.picture1.url }}" alt="{{ photo.title }}">
      {% if photo.title %}
        <div class="overlay">{{ photo.title }}</div>
      {% endif %}
    </div>
  {% empty %}
    <p style="color:#ccc;text-align:center;">No photos available.</p>
  {% endfor %}
</div>

<div style="text-align:center;">
  <a href="{% url 'home_function' %}" class="btn">Back to Home</a>
</div>

{% endblock %}
